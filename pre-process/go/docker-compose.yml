services:
  go-preprocess:
    build:
      context: ..
      dockerfile: go/Dockerfile
    image: opendep-go-preprocess:latest
    working_dir: /workspace
    environment:
      PYTHONPATH: /workspace
      PYTHONUNBUFFERED: "1"
      PREPROCESS_DB_HOST: ${GO_PREPROCESS_DB_HOST:-host.docker.internal}
      PREPROCESS_DB_PORT: ${PREPROCESS_DB_PORT:-55432}
      PREPROCESS_DB_NAME: ${PREPROCESS_DB_NAME:-opendep_preprocess}
      PREPROCESS_DB_USER: ${PREPROCESS_DB_USER:-opendep}
      PREPROCESS_DB_PASSWORD: ${PREPROCESS_DB_PASSWORD:-opendep}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../..:/workspace
