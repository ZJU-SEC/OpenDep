services:
  preprocess-db:
    image: cnspary/postgres:latest
    container_name: ${PREPROCESS_DB_CONTAINER_NAME:-opendep-preprocess-db}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PREPROCESS_DB_NAME:-opendep_preprocess}
      POSTGRES_USER: ${PREPROCESS_DB_USER:-opendep}
      POSTGRES_PASSWORD: ${PREPROCESS_DB_PASSWORD:-opendep}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${PREPROCESS_DB_PORT:-55432}:5432"
    volumes:
      - preprocess_postgres_data:/var/lib/postgresql/data/pgdata
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${PREPROCESS_DB_USER:-opendep} -d ${PREPROCESS_DB_NAME:-opendep_preprocess}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  preprocess-db-migrate:
    build:
      context: ../..
      dockerfile: common/database/Dockerfile.migrations
    image: opendep-preprocess-db-migrations:latest
    working_dir: /workspace/pre-process/common/database
    depends_on:
      preprocess-db:
        condition: service_healthy
    environment:
      PREPROCESS_DB_HOST: preprocess-db
      PREPROCESS_DB_PORT: 5432
      PREPROCESS_DB_NAME: ${PREPROCESS_DB_NAME:-opendep_preprocess}
      PREPROCESS_DB_USER: ${PREPROCESS_DB_USER:-opendep}
      PREPROCESS_DB_PASSWORD: ${PREPROCESS_DB_PASSWORD:-opendep}
    volumes:
      - ../../..:/workspace
    restart: "no"
    command: ["apply"]

volumes:
  preprocess_postgres_data:
    name: opendep-preprocess-postgres-data
