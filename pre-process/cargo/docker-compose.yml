services:
  cargo-preprocess:
    build:
      context: ..
      dockerfile: cargo/Dockerfile
    image: opendep-cargo-preprocess:latest
    working_dir: /workspace
    environment:
      PYTHONPATH: /workspace
      PYTHONUNBUFFERED: "1"
      CARGO_INDEX_URL: ${CARGO_INDEX_URL:-https://github.com/rust-lang/crates.io-index.git}
    volumes:
      - ../..:/workspace
      - cargo_data:/cargo-preprocess-data

volumes:
  cargo_data:
    name: ${CARGO_DATA_VOLUME_NAME:-resolver-cargo-cache}
